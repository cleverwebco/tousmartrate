<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16253e"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Lightning bolt — clean geometric shape -->
  <!-- Upper-right wing going down-left, then kick right to lower -->
  <polygon points="19,3 10,17 15.5,17 13,29 22,15 16.5,15" fill="url(#bolt)"/>

  <!-- Small accent dot — blue, top right -->
  <circle cx="24" cy="6" r="2.2" fill="#2563eb" opacity="0.9"/>
</svg>
